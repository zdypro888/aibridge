<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>aibridge</title>
<link rel="stylesheet" href="/vendor/xterm.css" />
<script src="/vendor/xterm.js"></script>
<script src="/vendor/addon-fit.js"></script>
<style>
  :root { --bg:#0d1117; --panel:#161b22; --border:#30363d; --fg:#c9d1d9; --muted:#8b949e;
          --accent:#58a6ff; --good:#3fb950; --warn:#d29922; --bad:#f85149; }
  * { box-sizing: border-box; }
  body { margin:0; font:13px/1.5 ui-monospace,SFMono-Regular,Menlo,monospace; background:var(--bg); color:var(--fg); }
  header { display:flex; align-items:center; gap:12px; padding:10px 16px; border-bottom:1px solid var(--border); background:var(--panel); }
  header h1 { font-size:15px; margin:0; }
  header .status { margin-left:auto; display:flex; align-items:center; gap:8px; }
  .dot { width:9px; height:9px; border-radius:50%; background:var(--muted); }
  .dot.run { background:var(--good); animation:pulse 1.2s infinite; }
  .dot.done { background:var(--accent); }
  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.3} }
  button { font:inherit; background:#21262d; color:var(--fg); border:1px solid var(--border); border-radius:6px; padding:5px 10px; cursor:pointer; }
  button:hover { border-color:var(--accent); }
  button.primary { background:var(--accent); color:#0d1117; border-color:var(--accent); font-weight:600; }
  button.danger { color:var(--bad); }
  select.lang { background:#21262d; color:var(--fg); border:1px solid var(--border); border-radius:6px; padding:4px 6px; font:inherit; }
  button:disabled { opacity:.4; cursor:not-allowed; }
  button:disabled:hover { border-color:var(--border); }
  button.toggle.on { background:var(--accent); color:#0d1117; border-color:var(--accent); font-weight:600; }
  .bar { display:flex; gap:8px; padding:10px 16px; flex-wrap:wrap; align-items:center; border-bottom:1px solid var(--border); }
  .sep { width:1px; align-self:stretch; background:var(--border); margin:0 4px; }
  /* Responsive: two columns when there's room, auto-collapse to one when narrow.
     minmax(360px,1fr) means each panel needs >=360px or the grid drops to a
     single column — no media query needed for the main split. */
  main { display:grid; grid-template-columns:repeat(auto-fit, minmax(360px, 1fr)); gap:10px; padding:12px 16px; }
  .panel { background:var(--panel); border:1px solid var(--border); border-radius:8px; display:flex; flex-direction:column; min-width:0; }
  .panel h2 { margin:0; padding:8px 12px; font-size:13px; border-bottom:1px solid var(--border); display:flex; align-items:center; gap:8px; }
  .panel h2 .v { margin-left:auto; font-size:11px; padding:1px 7px; border-radius:10px; background:#21262d; color:var(--muted); }
  .v.CLEAN{color:var(--good)} .v.FIXED{color:var(--warn)} .v.ISSUES{color:var(--bad)} .v.UNKNOWN{color:var(--muted)}
  /* screen height scales with viewport; clamp keeps it usable on short and tall screens */
  .screen { flex:1; margin:0; padding:10px 12px; overflow:auto; white-space:pre-wrap; word-break:break-word; font-size:12px; color:#aeb6bf; max-height:clamp(180px, 42vh, 600px); }
  /* live terminal: FIXED height so the panel never grows with output; xterm's own
     viewport handles scrolling inside this box. height (not flex/min-height) +
     overflow:hidden is what pins the window — min-height let the panel stretch
     with content. xterm fits its grid to this box via FitAddon. */
  .term { height:clamp(240px, 60vh, 680px); padding:4px 6px; overflow:hidden; }
  .term-empty { flex:1; display:flex; align-items:center; justify-content:center; color:var(--muted); min-height:200px; }
  .panel .ctl { display:flex; gap:6px; padding:8px 12px; border-top:1px solid var(--border); flex-wrap:wrap; }
  .panel .ctl input { flex:1; min-width:0; background:#0d1117; color:var(--fg); border:1px solid var(--border); border-radius:6px; padding:4px 8px; font:inherit; }
  section.wide { padding:0 16px 16px; }
  .timeline { background:var(--panel); border:1px solid var(--border); border-radius:8px; max-height:24vh; overflow:auto; padding:8px 12px; }
  .ev { padding:2px 0; color:var(--muted); }
  .ev b { color:var(--fg); }
  .ev .k { display:inline-block; min-width:118px; color:var(--accent); }
  dialog { background:var(--panel); color:var(--fg); border:1px solid var(--border); border-radius:10px; width:min(680px,92vw); max-height:86vh; overflow:auto; }
  dialog::backdrop { background:rgba(0,0,0,.6); }
  .cfg { display:grid; grid-template-columns:170px 1fr; gap:8px 12px; align-items:center; }
  .cfg h3 { grid-column:1/-1; margin:14px 0 2px; font-size:13px; color:var(--accent); border-bottom:1px solid var(--border); padding-bottom:4px; }
  .cfg label { color:var(--muted); }
  .cfg input,.cfg select,.cfg textarea { background:#0d1117; color:var(--fg); border:1px solid var(--border); border-radius:6px; padding:5px 8px; font:inherit; width:100%; }
  .cfg textarea { min-height:54px; resize:vertical; }
  .row-end { display:flex; gap:8px; justify-content:flex-end; margin-top:14px; }
  .banner { margin:12px 16px 0; padding:10px 12px; border-radius:8px; display:none; }
  .banner.show { display:block; }
  .banner.good { background:#10301a; color:var(--good); border:1px solid var(--good); }
  .banner.bad  { background:#3a1414; color:var(--bad); border:1px solid var(--bad); }

  /* Narrow screens (phones / split panes): tighten chrome and stack the config
     editor's label/control pairs vertically so nothing overflows. */
  @media (max-width: 600px) {
    body { font-size:12px; }
    header { flex-wrap:wrap; gap:8px; padding:8px 10px; }
    header .status { margin-left:0; }
    #strategy { width:100%; order:3; }
    .bar { padding:8px 10px; gap:6px; }
    .sep { display:none; }
    main { padding:8px 10px; gap:8px; }
    section.wide { padding:0 10px 10px; }
    .banner { margin:8px 10px 0; }
    .cfg { grid-template-columns:1fr; gap:4px 0; }
    .cfg label { margin-top:8px; }
    .cfg h3 { margin-top:10px; }
  }
</style>
<!-- Polished override layer: redefines look & feel on top of the base rules
     above (later rules win). Keeps all existing class names / JS untouched. -->
<style>
  :root {
    --bg:#0b0e14; --bg2:#0f131c; --panel:#141925; --panel2:#1a2030;
    --border:#262e3f; --border2:#323c52; --fg:#e6edf3; --muted:#8b95a7;
    --accent:#6aa3ff; --accent2:#8ab4ff; --good:#3fb950; --warn:#e3b341; --bad:#f85149;
    --radius:10px; --radius-sm:7px; --shadow:0 1px 2px rgba(0,0,0,.4), 0 4px 16px rgba(0,0,0,.25);
    --sans:-apple-system,BlinkMacSystemFont,"Segoe UI","PingFang SC","Hiragino Sans GB",Roboto,Helvetica,Arial,sans-serif;
    --mono:ui-monospace,SFMono-Regular,"SF Mono",Menlo,Consolas,monospace;
  }
  html,body { height:100%; }
  body {
    font:14px/1.55 var(--sans); color:var(--fg);
    background:radial-gradient(1200px 600px at 70% -10%, #18203200, #0b0e14 60%), var(--bg);
    -webkit-font-smoothing:antialiased; text-rendering:optimizeLegibility;
  }

  /* ---- header ---- */
  header {
    gap:14px; padding:12px 20px; background:rgba(20,25,37,.7);
    backdrop-filter:saturate(140%) blur(10px); border-bottom:1px solid var(--border);
    position:sticky; top:0; z-index:50;
  }
  header h1 { font-size:16px; font-weight:700; letter-spacing:.2px; display:flex; align-items:center; gap:7px; }
  #strategy { color:var(--muted); font-size:12.5px; }
  .dot { width:8px; height:8px; box-shadow:0 0 0 4px rgba(106,163,255,.0); }
  .dot.run { background:var(--good); box-shadow:0 0 0 4px rgba(63,185,80,.15); }
  .dot.done { background:var(--accent); }
  #statusText { font-size:12.5px; color:var(--muted); }
  select.lang { border-radius:var(--radius-sm); padding:5px 8px; background:var(--panel2); cursor:pointer; }

  /* ---- buttons ---- */
  button {
    font:600 13px/1 var(--sans); background:var(--panel2); color:var(--fg);
    border:1px solid var(--border2); border-radius:var(--radius-sm);
    padding:8px 13px; cursor:pointer; transition:all .14s ease; white-space:nowrap;
  }
  button:hover:not(:disabled) { border-color:var(--accent); background:#222b3d; transform:translateY(-1px); }
  button:active:not(:disabled) { transform:translateY(0); }
  button.primary { background:linear-gradient(180deg,var(--accent2),var(--accent)); color:#08111f; border-color:transparent; box-shadow:0 2px 8px rgba(106,163,255,.3); }
  button.primary:hover:not(:disabled) { filter:brightness(1.08); background:linear-gradient(180deg,var(--accent2),var(--accent)); }
  button.danger { color:var(--bad); }
  button.danger:hover:not(:disabled) { border-color:var(--bad); background:#2a1517; }
  button:disabled { opacity:.35; cursor:not-allowed; }
  button.toggle { border-radius:999px; padding:7px 16px; }
  button.toggle.on { background:linear-gradient(180deg,var(--accent2),var(--accent)); color:#08111f; border-color:transparent; box-shadow:0 2px 8px rgba(106,163,255,.3); }

  .bar { gap:9px; padding:12px 20px; background:var(--bg2); border-bottom:1px solid var(--border); }
  .sep { background:var(--border2); margin:0 6px; }

  /* ---- panels ---- */
  main { gap:14px; padding:16px 20px; grid-template-columns:repeat(auto-fit, minmax(380px, 1fr)); }
  .panel { border:1px solid var(--border); border-radius:var(--radius); box-shadow:var(--shadow); overflow:hidden; background:var(--panel); }
  .panel h2 {
    padding:11px 14px; font:600 13px/1 var(--sans); letter-spacing:.3px;
    background:linear-gradient(180deg,var(--panel2),var(--panel)); border-bottom:1px solid var(--border);
  }
  .panel h2 .v { font:600 10.5px/1 var(--sans); letter-spacing:.5px; padding:4px 9px; border-radius:999px; background:#0d1117; border:1px solid var(--border2); text-transform:uppercase; }
  .v.CLEAN{color:var(--good);border-color:rgba(63,185,80,.4)} .v.FIXED{color:var(--warn);border-color:rgba(227,179,65,.4)} .v.ISSUES{color:var(--bad);border-color:rgba(248,81,73,.4)}
  .term { background:#0a0d13; }
  .term-empty { color:var(--muted); font-size:13px; }
  .panel .ctl { padding:10px 12px; gap:8px; background:var(--bg2); border-top:1px solid var(--border); }
  .panel .ctl input { background:#0a0d13; border:1px solid var(--border2); border-radius:var(--radius-sm); padding:8px 11px; font:13px/1 var(--mono); transition:border-color .14s; }
  .panel .ctl input:focus { outline:none; border-color:var(--accent); box-shadow:0 0 0 3px rgba(106,163,255,.15); }

  /* ---- timeline ---- */
  .timeline { border:1px solid var(--border); border-radius:var(--radius); box-shadow:var(--shadow); padding:10px 14px; background:var(--panel); }
  .ev { padding:3px 0; font:12.5px/1.5 var(--mono); border-bottom:1px solid rgba(255,255,255,.03); }
  .ev:last-child { border-bottom:none; }
  .ev .k { min-width:120px; color:var(--accent); font-weight:600; }

  /* ---- config dialog ---- */
  dialog {
    border:1px solid var(--border2); border-radius:14px; padding:0;
    width:min(720px,94vw); max-height:88vh; box-shadow:0 20px 60px rgba(0,0,0,.6);
    background:var(--panel); color:var(--fg);
  }
  dialog::backdrop { background:rgba(5,8,14,.66); backdrop-filter:blur(3px); }
  #cfgForm { display:flex; flex-direction:column; max-height:88vh; }
  #cfgFields { padding:22px 24px 6px; overflow:auto; }
  /* card-section feel: each h3 starts a titled group; the grid pairs read like a table */
  .cfg { grid-template-columns:160px 1fr; gap:11px 16px; align-items:center; }
  .cfg h3 {
    grid-column:1/-1; margin:22px 0 10px; padding:0 0 9px; font:700 13px/1 var(--sans);
    letter-spacing:.4px; color:var(--fg); border-bottom:1px solid var(--border2);
    display:flex; align-items:center; gap:8px;
  }
  .cfg h3:first-child { margin-top:2px; }
  .cfg h3::before { content:""; width:3px; height:14px; border-radius:2px; background:var(--accent); }
  .cfg label { color:var(--muted); font-size:13px; }
  .cfg input,.cfg select,.cfg textarea {
    background:#0a0d13; border:1px solid var(--border2); border-radius:var(--radius-sm);
    padding:8px 11px; font:13px/1.4 var(--sans); transition:border-color .14s, box-shadow .14s;
  }
  .cfg textarea { min-height:70px; font:12.5px/1.5 var(--mono); resize:vertical; }
  .cfg input:focus,.cfg select:focus,.cfg textarea:focus { outline:none; border-color:var(--accent); box-shadow:0 0 0 3px rgba(106,163,255,.15); }
  .cfg textarea::placeholder { color:#5a6678; opacity:.7; }
  .row-end { padding:16px 24px; margin:0; border-top:1px solid var(--border); background:var(--bg2); border-radius:0 0 14px 14px; }

  .banner { margin:12px 20px 0; border-radius:var(--radius-sm); font-weight:500; }

  /* ---- scrollbars ---- */
  ::-webkit-scrollbar { width:10px; height:10px; }
  ::-webkit-scrollbar-thumb { background:#2b3447; border-radius:6px; border:2px solid transparent; background-clip:padding-box; }
  ::-webkit-scrollbar-thumb:hover { background:#3a455c; background-clip:padding-box; }
  ::-webkit-scrollbar-track { background:transparent; }

  /* ---- full-height layout: terminals fill the remaining viewport, the log sits
     under the controls showing ~3 rows and scrolls. The page itself never
     scrolls on desktop; only the log and each terminal scroll internally. ---- */
  html,body { height:100%; }
  body { display:flex; flex-direction:column; min-height:100vh; }
  header, .bar, .banner, section.wide { flex:0 0 auto; }
  section.wide { padding:12px 20px 0; }
  .timeline { height:76px; max-height:76px; overflow-y:auto; }
  main { flex:1 1 auto; min-height:0; }              /* fill leftover height */
  .panel { min-height:0; }                            /* allow children to shrink */
  .term { height:auto; flex:1 1 auto; min-height:0; } /* terminal fills the panel */

  /* ---- mobile ---- */
  @media (max-width:640px) {
    /* On phones a single filled viewport with two stacked terminals is cramped,
       so let the page scroll and give each terminal a comfortable fixed height. */
    body { display:block; }
    main { display:grid; }
    .term { height:clamp(240px,46vh,460px); flex:none; }
    section.wide { padding:10px 12px 0; }
    .timeline { height:68px; max-height:68px; }
    header { padding:10px 12px; gap:10px; }
    header h1 { font-size:15px; }
    .bar { padding:10px 12px; gap:7px; }
    main { padding:12px; gap:12px; grid-template-columns:1fr; }
    button { padding:9px 13px; }
    button.toggle { padding:8px 15px; }
    .cfg { grid-template-columns:1fr; gap:6px 0; }
    .cfg label { margin-top:10px; font-weight:600; color:var(--fg); }
    .cfg h3 { margin-top:18px; }
    #cfgFields { padding:18px 16px 4px; }
    .row-end { padding:14px 16px; }
    .term { height:clamp(220px,52vh,560px); }
  }
</style>
</head>
<body>
<header>
  <h1>🌉 aibridge</h1>
  <span class="muted" id="strategy"></span>
  <div class="status">
    <select class="lang" id="uiLang" title="UI language">
      <option value="en">English</option>
      <option value="zh">中文</option>
    </select>
    <span class="dot" id="dot"></span>
    <span id="statusText"></span>
  </div>
</header>

<div class="bar">
  <button class="primary" id="btnStart" data-i18n="start" data-i18n-title="ttStart"></button>
  <button class="danger" id="btnStop" data-i18n="stop" data-i18n-title="ttStop"></button>
  <button id="btnPause" data-i18n="pause" data-i18n-title="ttPause"></button>
  <button id="btnResume" data-i18n="resume" data-i18n-title="ttResume"></button>
  <span class="sep"></span>
  <span style="color:var(--muted)" data-i18n="drive" data-i18n-title="ttDrive"></span>
  <button class="toggle" data-toggle="codex" data-i18n-title="ttToggleCodex">codex</button>
  <button class="toggle" data-toggle="claude" data-i18n-title="ttToggleClaude">claude</button>
  <button id="btnTemplates" style="margin-left:auto" data-i18n="templates" data-i18n-title="ttTemplates"></button>
  <button id="btnConfig" data-i18n="config" data-i18n-title="ttConfig"></button>
</div>

<div class="banner" id="banner"></div>

<section class="wide">
  <div class="timeline" id="timeline"></div>
</section>

<main>
  <div class="panel">
    <h2>codex <span class="v UNKNOWN" id="vcodex">—</span></h2>
    <div class="term-empty" id="ecodex" data-i18n="notStarted"></div>
    <div class="term" id="tcodex" style="display:none"></div>
    <div class="ctl">
      <button data-skip="codex" data-i18n="skipNext" data-i18n-title="ttSkip"></button>
      <input id="icodex" data-i18n-ph="injectCodex" />
      <button data-inject="codex" data-i18n="send" data-i18n-title="ttSend"></button>
    </div>
  </div>
  <div class="panel">
    <h2>claude <span class="v UNKNOWN" id="vclaude">—</span></h2>
    <div class="term-empty" id="eclaude" data-i18n="notStarted"></div>
    <div class="term" id="tclaude" style="display:none"></div>
    <div class="ctl">
      <button data-skip="claude" data-i18n="skipNext" data-i18n-title="ttSkip"></button>
      <input id="iclaude" data-i18n-ph="injectClaude" />
      <button data-inject="claude" data-i18n="send" data-i18n-title="ttSend"></button>
    </div>
  </div>
</main>

<dialog id="cfgDialog">
  <form id="cfgForm" method="dialog">
    <div class="cfg" id="cfgFields"></div>
    <div class="row-end">
      <button value="cancel" data-i18n="cancel"></button>
      <button class="primary" id="cfgSave" value="save" data-i18n="save"></button>
    </div>
  </form>
</dialog>

<dialog id="tmplDialog">
  <form id="tmplForm" method="dialog">
    <div class="cfg" id="tmplFields"></div>
    <div class="row-end">
      <button value="cancel" data-i18n="cancel"></button>
      <button class="primary" id="tmplSave" value="save" data-i18n="save"></button>
    </div>
  </form>
</dialog>

<script>
const $ = (id) => document.getElementById(id);
let CFG = null;

// ---- i18n ----
const I18N = {
  en: {

    drive: "drive:", config: "⚙ Config", skipNext: "skip next", send: "send",

    cfgMaxRounds: "Max rounds (0 = unlimited)", cfgStrategy: "Convergence strategy",
    cfgEnabled: "Enabled", cfgCommand: "Command", cfgStable: "Stable for", cfgSettle: "Settle for",
    cfgTimeout: "Timeout",
    saved: "Config saved",
    tmplActive: "Active template", tmplNew: "+ New", tmplDelete: "Delete",
    tmplName: "Name", tmplAsk: "Ask prompt (optional)",
    tmplCodexFirst: "Codex · first turn", tmplCodexNext: "Codex · next turns",
    tmplClaudeFirst: "Claude · first turn", tmplClaudeNext: "Claude · next turns",
    tmplDefaultHint: "Empty = use the built-in go-audit default (shown as the grey placeholder).",
    tmplSaved: "Templates saved", tmplNamePrompt: "Template name:", tmplDelConfirm: "Delete this template?",
  },
  zh: {
    start: "▶ 开始", stop: "■ 停止", pause: "⏸ 暂停", resume: "⏵ 继续",
    drive: "驱动:", config: "⚙ 配置", skipNext: "跳过下一轮", send: "发送",
    injectCodex: "给 codex 注入一句话…", injectClaude: "给 claude 注入一句话…",
    notStarted: "(未开始 — 点 ▶ 开始)", cancel: "取消", save: "保存",
    idle: "空闲", running: "运行中", converged: "✓ 已收敛 — 双方都干净", stopped: "已停止",
    ttStart: "启动两个 AI 并开始互审循环",
    ttStop: "中止当前运行并关闭两个 AI",
    ttPause: "在下一轮边界暂停循环",
    ttResume: "继续已暂停的循环",
    ttDrive: "选择哪些 AI 参与。高亮=参与。至少保留一个高亮。",
    ttToggleCodex: "切换 codex 是否参与轮次",
    ttToggleClaude: "切换 claude 是否参与轮次",
    ttConfig: "编辑运行设置(AI、策略、超时、语言)",
    templates: "✎ 提示词", ttTemplates: "管理提示词模板(与设置分开)",
    ttSkip: "让这个 AI 跳过它的下一轮",
    ttSend: "在这个 AI 下一轮前注入输入框里的消息",
    cfgGeneral: "通用", cfgRepo: "仓库路径", cfgUILang: "AI / 报告语言",
    cfgAddr: "Web 地址", cfgFlow: "流程", cfgFirst: "谁先审",
    cfgMaxRounds: "最大轮次 (0 = 无限)", cfgStrategy: "收敛策略",
    cfgEnabled: "启用", cfgCommand: "启动命令", cfgStable: "稳定判定", cfgSettle: "等待启动",
    cfgTimeout: "超时",
    saved: "配置已保存",
    tmplActive: "当前使用", tmplNew: "+ 新建", tmplDelete: "删除",
    tmplName: "名称", tmplAsk: "追问提示词(可选)",
    tmplCodexFirst: "Codex · 首轮", tmplCodexNext: "Codex · 后续轮",
    tmplClaudeFirst: "Claude · 首轮", tmplClaudeNext: "Claude · 后续轮",
    tmplDefaultHint: "留空 = 用内置 go-audit 默认(显示为灰色占位)。",
    tmplSaved: "模板已保存", tmplNamePrompt: "模板名称:", tmplDelConfirm: "删除这个模板?",
  },
};
let UILANG = localStorage.getItem("aibridge.uilang") || "zh";
function t(key) { return (I18N[UILANG] && I18N[UILANG][key]) || I18N.en[key] || key; }
function applyI18n() {
  document.documentElement.lang = UILANG;
  document.querySelectorAll("[data-i18n]").forEach((el) => (el.textContent = t(el.dataset.i18n)));
  document.querySelectorAll("[data-i18n-ph]").forEach((el) => (el.placeholder = t(el.dataset.i18nPh)));
  document.querySelectorAll("[data-i18n-title]").forEach((el) => (el.title = t(el.dataset.i18nTitle)));
  if (!statusKey) setStatus("idle");
  else setStatus(statusKey, statusCls, statusExtra);
}
$("uiLang").onchange = (e) => {
  UILANG = e.target.value;
  localStorage.setItem("aibridge.uilang", UILANG);
  applyI18n();
  if (CFG && $("cfgDialog").open) renderConfig(CFG);
};

async function api(path, method = "GET", body) {
  const opt = { method, headers: { "Content-Type": "application/json" } };
  if (body) opt.body = JSON.stringify(body);
  const r = await fetch(path, opt);
  const j = await r.json().catch(() => ({}));
  if (!r.ok) throw new Error(j.error || r.statusText);
  return j;
}

function banner(msg, ok) {
  const b = $("banner");
  b.textContent = msg;
  b.className = "banner show " + (ok ? "good" : "bad");
  setTimeout(() => (b.className = "banner"), 4000);
}

// ---- status (i18n-aware, remembers key so language switch re-renders) ----
let statusKey = "", statusCls = "", statusExtra = "";
function setStatus(key, cls, extra) {
  statusKey = key; statusCls = cls || ""; statusExtra = extra || "";
  $("statusText").textContent = t(key) + (extra ? " · " + extra : "");
  $("dot").className = "dot " + (cls || "");
}

// ---- live event stream (SSE) ----
function connect() {
  const es = new EventSource("/api/events");
  es.onmessage = (m) => { try { handleEvent(JSON.parse(m.data)); } catch {} };
  // On every (re)connect, re-sync run state from the server so the dashboard can
  // never get stuck on "not started" while a run is actually live (page opened
  // after run_started, or SSE dropped and reconnected). openTerminal() is
  // idempotent, so re-opening is safe.
  es.onopen = () => { syncRunState(); };
  es.onerror = () => { es.close(); setTimeout(connect, 1000); };
}

// syncRunState reconciles the UI (drive toggles, running flag, terminals) with
// the server's actual state. Called on first load and every SSE (re)connect.
async function syncRunState() {
  const st = await api("/api/status").catch(() => null);
  if (!st) return;
  const only = st.control && st.control.onlySide;
  active = { codex: only !== "claude", claude: only !== "codex" };
  renderDrive();
  setRunning(!!st.running);
  if (st.running) { setStatus("running", "run"); openTerminals(); }
}

function addTimeline(e) {
  const tl = $("timeline");
  const div = document.createElement("div");
  div.className = "ev";
  const ts = new Date(e.time || Date.now()).toLocaleTimeString();
  let detail = e.message || "";
  if (e.verdict) detail = `[${e.verdict}] ${detail}`;
  const kind = document.createElement("span");
  kind.className = "k";
  kind.textContent = e.kind || "";
  const side = document.createElement("b");
  side.textContent = e.side || "";
  const time = document.createElement("span");
  time.style.cssText = "float:right;color:#586069";
  time.textContent = ts;
  div.append(kind, " ", side, " ", detail, " ", time);
  tl.appendChild(div);
  tl.scrollTop = tl.scrollHeight;
}

function handleEvent(e) {
  switch (e.kind) {
    // Live output now comes through the xterm websocket (real terminal), so the
    // "screen" SSE events are no longer used for display. run_started opens the
    // terminals; stop/converged closes them.
    case "run_started": setRunning(true); setStatus("running", "run"); openTerminals(); addTimeline(e); break;
    case "screen": break;
    case "turn_started": setStatus("running", "run", `${e.side} #${e.round}`); addTimeline(e); break;
    case "turn_finished": {
      const v = $(e.side === "codex" ? "vcodex" : "vclaude");
      if (v) { v.textContent = e.verdict; v.className = "v " + e.verdict; }
      addTimeline(e); break;
    }
    case "converged": setRunning(false); setStatus("converged", "done"); closeTerminals(); addTimeline(e); banner(t("converged"), true); break;
    case "stopped": setRunning(false); setStatus("stopped", "done"); closeTerminals(); addTimeline(e); break;
    default: addTimeline(e);
  }
}

// ---- live terminals: xterm.js rendering each agent's raw pty byte stream ----
const TERM = {}; // side -> { term, fit, ws }

function openTerminal(side) {
  if (TERM[side]) return; // already open
  const host = $("t" + side);
  const empty = $("e" + side);
  empty.style.display = "none";
  host.style.display = "block";

  // The terminal renders the agent's raw pty byte stream. FitAddon sizes the
  // grid to the panel so nothing is cut off; we tell the server the fitted size
  // so the pty/emulator match (no wrap, no blank columns).
  const term = new Terminal({
    convertEol: false,
    fontFamily: "ui-monospace,SFMono-Regular,Menlo,monospace",
    fontSize: 11,
    theme: { background: "#161b22", foreground: "#c9d1d9" },
    scrollback: 2000,
  });
  const fit = new FitAddon.FitAddon();
  term.loadAddon(fit);
  term.open(host);
  try { fit.fit(); } catch {}

  const proto = location.protocol === "https:" ? "wss" : "ws";
  const ws = new WebSocket(`${proto}://${location.host}/ws/terminal?side=${side}`);
  ws.binaryType = "arraybuffer"; // server sends raw pty bytes as binary frames

  const sendResize = () => {
    try { fit.fit(); } catch {}
    if (ws.readyState === 1) ws.send(JSON.stringify({ type: "resize", cols: term.cols, rows: term.rows }));
  };
  const send = (s) => { if (ws.readyState === 1) ws.send(s); };
  // Announce focus once on connect (DECSET 1004 focus-in, ESC [ I): Claude Code
  // gates keyboard input on having seen a focus event, and our pty has no real
  // terminal. NOTE: this xterm build has no term.onFocus/onBlur — calling them
  // throws and aborts openTerminal (which is exactly what left the claude panel
  // blank). Sending once on open is enough; do not hook focus/blur events.
  ws.onopen = () => { sendResize(); term.focus(); send("\x1b[I"); };
  ws.onmessage = (ev) => {
    // Binary frames (the normal path) arrive as ArrayBuffer; text frames as string.
    if (typeof ev.data === "string") term.write(ev.data);
    else term.write(new Uint8Array(ev.data));
  };
  ws.onclose = () => { /* keep last frame; closeTerminals handles teardown */ };
  // keystrokes (including "/", arrows, Ctrl-*) → the agent's pty
  term.onData((d) => { send(d); });

  TERM[side] = { term, fit, ws, sendResize };
}

function openTerminals() {
  if (active.codex) openTerminal("codex");
  if (active.claude) openTerminal("claude");
}

function closeTerminals() {
  for (const side of Object.keys(TERM)) {
    try { TERM[side].ws.close(); } catch {}
    try { TERM[side].term.dispose(); } catch {}
    const host = $("t" + side), empty = $("e" + side);
    if (host) host.style.display = "none";
    if (empty) empty.style.display = "flex";
    delete TERM[side];
  }
}

// Refit terminals to their panels when the window resizes.
window.addEventListener("resize", () => {
  for (const side of Object.keys(TERM)) TERM[side].sendResize();
});

// ---- run state → enable/disable buttons ----
// running=false: only Start + Config + drive toggles + (config) usable; Stop/Pause/
// Resume/skip/inject are meaningless and get disabled so the UI can't lie.
let RUNNING = false;
// drive toggles: which sides are active. Derived from server's onlySide.
let active = { codex: true, claude: true };

function setRunning(r) {
  RUNNING = r;
  $("btnStart").disabled = r;
  $("btnStop").disabled = !r;
  $("btnPause").disabled = !r;
  $("btnResume").disabled = !r;
  document.querySelectorAll("[data-skip],[data-inject]").forEach((b) => (b.disabled = !r));
  document.querySelectorAll("#icodex,#iclaude").forEach((i) => (i.disabled = !r));
  // drive toggles stay usable always (you can pre-pick sides before Start)
}

function renderDrive() {
  document.querySelectorAll("[data-toggle]").forEach((b) =>
    b.classList.toggle("on", active[b.dataset.toggle]));
}

// Map the two toggles to the server's onlySide model:
//   both on  → onlySide ""        (no restriction)
//   codex on → onlySide "codex"   (only codex runs)
//   claude on→ onlySide "claude"
function pushDrive() {
  let side = "";
  if (active.codex && !active.claude) side = "codex";
  else if (active.claude && !active.codex) side = "claude";
  api("/api/control", "POST", { action: "only", side });
}

document.querySelectorAll("[data-toggle]").forEach((b) =>
  (b.onclick = () => {
    const s = b.dataset.toggle;
    const other = s === "codex" ? "claude" : "codex";
    // Don't allow turning the last one off.
    if (active[s] && !active[other]) { banner(t("ttDrive"), false); return; }
    active[s] = !active[s];
    renderDrive();
    pushDrive();
  }));

$("btnStart").onclick = async () => { try { await api("/api/start", "POST"); setRunning(true); } catch (e) { banner(e.message, false); } };
$("btnStop").onclick = () => api("/api/stop", "POST");
$("btnPause").onclick = () => api("/api/control", "POST", { action: "pause" });
$("btnResume").onclick = () => api("/api/control", "POST", { action: "resume" });
document.querySelectorAll("[data-skip]").forEach((b) =>
  (b.onclick = () => api("/api/control", "POST", { action: "skip", side: b.dataset.skip })));
document.querySelectorAll("[data-inject]").forEach((b) =>
  (b.onclick = () => {
    const side = b.dataset.inject;
    const inp = $(side === "codex" ? "icodex" : "iclaude");
    if (inp.value) { api("/api/control", "POST", { action: "inject", side, text: inp.value }); inp.value = ""; }
  }));

// ---- config editor ----
function esc(value) {
  return String(value ?? "")
    .replaceAll("&", "&amp;")
    .replaceAll("<", "&lt;")
    .replaceAll(">", "&gt;")
    .replaceAll('"', "&quot;")
    .replaceAll("'", "&#39;");
}

function field(label, key, value, type = "text", placeholder = "") {
  const ph = placeholder ? ` placeholder="${esc(placeholder)}"` : "";
  return `<label>${label}</label>${
    type === "textarea"
      ? `<textarea data-key="${esc(key)}"${ph}>${esc(value)}</textarea>`
      : `<input data-key="${esc(key)}" value="${esc(value)}"${ph} />`
  }`;
}
function selectField(label, key, value, opts) {
  return `<label>${label}</label><select data-key="${esc(key)}">${opts
    .map((o) => `<option ${o === value ? "selected" : ""}>${esc(o)}</option>`)
    .join("")}</select>`;
}
function boolField(label, key, value) {
  return `<label>${label}</label><select data-key="${esc(key)}"><option ${value ? "selected" : ""}>true</option><option ${!value ? "selected" : ""}>false</option></select>`;
}

function renderConfig(cfg) {
  const a = cfg.agents, f = cfg.flow;
  $("cfgFields").innerHTML = `
    <h3>${t("cfgGeneral")}</h3>
    ${field(t("cfgRepo"), "repo", cfg.repo)}
    ${selectField(t("cfgUILang"), "lang", cfg.lang || "en", ["en", "zh"])}
    ${field(t("cfgAddr"), "server.addr", cfg.server.addr)}
    <h3>${t("cfgFlow")}</h3>
    ${selectField(t("cfgFirst"), "flow.first", f.first, ["codex", "claude"])}
    ${field(t("cfgMaxRounds"), "flow.max_rounds", f.max_rounds)}
    ${selectField(t("cfgStrategy"), "flow.strategy", f.strategy, ["combined", "diff-fixpoint", "ask-gate"])}
    <h3>Codex</h3>
    ${boolField(t("cfgEnabled"), "agents.codex.enabled", a.codex.enabled)}
    ${field(t("cfgCommand"), "agents.codex.command", a.codex.command)}
    ${field(t("cfgStable"), "agents.codex.stable_for", a.codex.stable_for)}
    ${field(t("cfgSettle"), "agents.codex.settle_for", a.codex.settle_for)}
    ${field(t("cfgTimeout"), "agents.codex.timeout", a.codex.timeout)}
    <h3>Claude</h3>
    ${boolField(t("cfgEnabled"), "agents.claude.enabled", a.claude.enabled)}
    ${field(t("cfgCommand"), "agents.claude.command", a.claude.command)}
    ${field(t("cfgStable"), "agents.claude.stable_for", a.claude.stable_for)}
    ${field(t("cfgSettle"), "agents.claude.settle_for", a.claude.settle_for)}
    ${field(t("cfgTimeout"), "agents.claude.timeout", a.claude.timeout)}
  `;
}

// ---- prompt template library ----
// The library is separate from run config: a set of named templates, each with
// both agents' first/next prompts + an ask question. Two built-ins ship and are
// read-only ("修改审核" diff review, "代码全局审核" whole-codebase sweep); empty
// fields fall back to the built-in go-audit doctrine, shown as grey placeholders.
const TBUILTIN = ["default", "full-review"];
let TLIB = { active: "default", templates: [] };
let TDEF = {}; // built-in defaults for the editing template's kind (placeholders)
let tSel = "default"; // id of the template currently shown/selected (also = active on save)

function tplById(id) { return (TLIB.templates || []).find((x) => x.id === id); }

// loadDefaultsFor fetches the built-in prompt text for a review kind so the
// placeholders match what an empty field resolves to at run time.
async function loadDefaultsFor(kind) {
  const lang = (CFG && CFG.lang) || "";
  TDEF = (await api("/api/defaults?lang=" + encodeURIComponent(lang) + "&kind=" + encodeURIComponent(kind || "")).catch(() => ({}))) || {};
}

async function openTemplates() {
  TLIB = await api("/api/templates");
  tSel = TLIB.active;
  await renderTmpl();
  $("tmplDialog").showModal();
}

async function renderTmpl() {
  let tpl = tplById(tSel) || (TLIB.templates || [])[0] || { id: "default" };
  tSel = tpl.id;
  await loadDefaultsFor(tpl.kind);
  const ro = TBUILTIN.includes(tpl.id);
  const roA = ro ? " readonly" : "";
  const cx = tpl.codex || {}, cl = tpl.claude || {}, d = TDEF;
  const opts = (TLIB.templates || [])
    .map((x) => `<option value="${esc(x.id)}" ${x.id === tSel ? "selected" : ""}>${esc(x.name || x.id)}</option>`)
    .join("");
  const ta = (id, val, ph) => `<textarea id="${id}"${roA} placeholder="${esc(ph || "")}">${esc(val || "")}</textarea>`;
  $("tmplFields").innerHTML = `
    <h3>${t("templates")}</h3>
    <label>${t("tmplActive")}</label>
    <div style="display:flex;gap:8px;align-items:center">
      <select id="tmplSel" style="flex:1">${opts}</select>
      <button type="button" class="ghost" id="tmplNew">${t("tmplNew")}</button>
      <button type="button" class="ghost" id="tmplDel"${ro ? " disabled" : ""}>${t("tmplDelete")}</button>
    </div>
    ${ro ? `<label></label><small style="color:var(--muted)">${t("tmplDefaultHint")}</small>` : ""}
    <label>${t("tmplName")}</label><input id="tmplName" value="${esc(tpl.name || "")}"${roA} />
    <label>${t("tmplCodexFirst")}</label>${ta("tmplCxFirst", cx.first, d.codex && d.codex.first)}
    <label>${t("tmplCodexNext")}</label>${ta("tmplCxNext", cx.next, d.codex && d.codex.next)}
    <label>${t("tmplClaudeFirst")}</label>${ta("tmplClFirst", cl.first, d.claude && d.claude.first)}
    <label>${t("tmplClaudeNext")}</label>${ta("tmplClNext", cl.next, d.claude && d.claude.next)}
    <label>${t("tmplAsk")}</label>${ta("tmplAsk", tpl.ask, "")}
  `;
  $("tmplSel").onchange = async () => { captureTmpl(); tSel = $("tmplSel").value; await renderTmpl(); };
  $("tmplNew").onclick = () => {
    captureTmpl();
    const name = prompt(t("tmplNamePrompt"), "");
    if (!name) return;
    const id = "t" + Date.now().toString(36);
    TLIB.templates.push({ id, name, kind: "diff", codex: {}, claude: {}, ask: "" });
    tSel = id;
    renderTmpl();
  };
  $("tmplDel").onclick = () => {
    if (TBUILTIN.includes(tSel) || !confirm(t("tmplDelConfirm"))) return;
    TLIB.templates = (TLIB.templates || []).filter((x) => x.id !== tSel);
    if (TLIB.active === tSel) TLIB.active = "default";
    tSel = TLIB.active;
    renderTmpl();
  };
}

// captureTmpl copies the editor fields back into the selected custom template
// (built-ins are read-only, so their fields are never captured).
function captureTmpl() {
  const tpl = tplById(tSel);
  if (!tpl || TBUILTIN.includes(tpl.id)) return;
  if ($("tmplName")) tpl.name = $("tmplName").value;
  if ($("tmplCxFirst")) tpl.codex = { first: $("tmplCxFirst").value, next: $("tmplCxNext").value };
  if ($("tmplClFirst")) tpl.claude = { first: $("tmplClFirst").value, next: $("tmplClNext").value };
  if ($("tmplAsk")) tpl.ask = $("tmplAsk").value;
}

$("btnTemplates").onclick = () => openTemplates().catch((e) => banner(e.message, false));
$("tmplForm").addEventListener("submit", async (e) => {
  if (!e.submitter || e.submitter.value !== "save") return;
  captureTmpl();
  TLIB.active = tSel; // the selected template is the one runs will use
  try { await api("/api/templates", "POST", TLIB); banner(t("tmplSaved"), true); }
  catch (err) { banner(err.message, false); }
});

function setByPath(obj, path, val) {
  const parts = path.split(".");
  let o = obj;
  for (let i = 0; i < parts.length - 1; i++) o = o[parts[i]];
  o[parts[parts.length - 1]] = val;
}

function collectConfig() {
  const cfg = JSON.parse(JSON.stringify(CFG));
  document.querySelectorAll("[data-key]").forEach((el) => {
    let v = el.value;
    const key = el.dataset.key;
    if (key === "flow.max_rounds") v = parseInt(v, 10);
    else if (key.endsWith(".enabled")) v = v === "true";
    setByPath(cfg, key, v);
  });
  return cfg;
}

function showStrategyLine(cfg) {
  $("strategy").textContent = `${t("cfgStrategy")}: ${cfg.flow.strategy} · ${cfg.flow.first}`;
}

$("btnConfig").onclick = async () => {
  CFG = await api("/api/config");
  showStrategyLine(CFG);
  renderConfig(CFG);
  $("cfgDialog").showModal();
};

$("cfgForm").addEventListener("submit", async (e) => {
  if (e.submitter && e.submitter.value === "save") {
    try {
      const cfg = collectConfig();
      await api("/api/config", "POST", cfg);
      CFG = cfg;
      showStrategyLine(cfg);
      banner(t("saved"), true);
    } catch (err) { banner(err.message, false); }
  }
});

// init
(async () => {
  $("uiLang").value = UILANG;
  applyI18n();
  setStatus("idle");
  renderDrive();
  try {
    CFG = await api("/api/config");
    showStrategyLine(CFG);
  } catch {}
  // syncRunState reconciles drive/running/terminals with the server; connect()
  // also calls it on every (re)connect, so a live run is always reflected.
  await syncRunState();
  connect();
})();
</script>
</body>
